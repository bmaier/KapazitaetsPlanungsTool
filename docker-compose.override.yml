---
# BorderCapControl — Docker Compose Override (Lokale Entwicklung)
#
# Port-Übersicht:
#   3000  → Frontend  (Vite Dev-Server mit HMR)
#   5432  → PostgreSQL
#   8000  → Backend API (Uvicorn + WatchFiles Hot-Reload)
#   8001  → SKOS Codelisten
#   8025  → Mailpit WebUI (Dev-Mail-Catcher, http://localhost:8025)
#   8080  → Keycloak Admin-UI
#   8082  → Tileserver
#
# Workflow:
#   make dev    — startet Stack; baut Images nur wenn noch nicht vorhanden
#   make build  — erzwingt Rebuild aller Images (nach Dockerfile-/Dep-Änderungen)

version: "3.9"

volumes:
  # Isoliertes node_modules-Volume verhindert Host/Container-Konflikte
  frontend_node_modules:

services:

  # ---------------------------------------------------------------------------
  # Mailpit — Dev-Mail-Catcher (fängt alle von Keycloak gesendeten E-Mails ab)
  # WebUI:  http://localhost:8025
  # SMTP:   mailpit:1025 (intern, kein Auth)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # WebUI
      - "1025:1025"   # SMTP (intern → Keycloak)
    networks:
      - bordercap_net
    restart: unless-stopped

  postgres:
    ports:
      - "5432:5432"

  keycloak:
    ports:
      - "8080:8080"
    environment:
      # KEYCLOAK_PUBLIC_URL steuert die öffentliche Keycloak-URL in OIDC-Endpoints.
      # Wert aus .env-Datei oder Umgebungsvariable; Default: localhost für lokale Dev.
      # Auf Prod-Servern: KEYCLOAK_PUBLIC_URL=http://<server-ip>:8080 in .env setzen.
      KC_HOSTNAME_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}"
      KC_HOSTNAME_ADMIN_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}"
    volumes:
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro

  skos_service:
    build:
      context: ./skos_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  tileserver:
    ports:
      - "8082:8080"

  # Backend: Uvicorn + WatchFiles Hot-Reload, src/ live gemountet
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}"
    command: >
      python -m uvicorn src.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /home/appuser/app/src
    volumes:
      - ./backend/src:/home/appuser/app/src:rw
      - ./backend/alembic:/home/appuser/app/alembic:rw

  # Frontend: Vite Dev-Server mit HMR, src/ live gemountet
  # Proxy-Ziele via Env-Vars → Vite leitet an Docker-interne Service-Namen weiter
  frontend:
    image: node:20-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
      VITE_KEYCLOAK_URL: "http://keycloak:8080"
      VITE_TILESERVER_URL: "http://tileserver:8080"
    command: sh -c "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
