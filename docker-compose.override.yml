---
# BorderCapControl — Docker Compose Override (Lokale Entwicklung)
#
# Port-Übersicht:
#   3000  → Frontend  (Vite Dev-Server mit HMR)
#   5432  → PostgreSQL
#   8000  → Backend API (Uvicorn + WatchFiles Hot-Reload)
#   8001  → SKOS Codelisten
#   8080  → Keycloak Admin-UI
#   8082  → Tileserver
#
# Workflow:
#   make dev    — startet Stack; baut Images nur wenn noch nicht vorhanden
#   make build  — erzwingt Rebuild aller Images (nach Dockerfile-/Dep-Änderungen)

version: "3.9"

volumes:
  # Isoliertes node_modules-Volume verhindert Host/Container-Konflikte
  frontend_node_modules:

services:

  postgres:
    ports:
      - "5432:5432"

  keycloak:
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro

  skos_service:
    build:
      context: ./skos_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  tileserver:
    ports:
      - "8082:8080"

  # Backend: Uvicorn + WatchFiles Hot-Reload, src/ live gemountet
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_PUBLIC_URL: "http://localhost:8080"
    command: >
      python -m uvicorn src.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /home/appuser/app/src
    volumes:
      - ./backend/src:/home/appuser/app/src:rw
      - ./backend/alembic:/home/appuser/app/alembic:rw

  # Frontend: Vite Dev-Server mit HMR, src/ live gemountet
  # Proxy-Ziele via Env-Vars → Vite leitet an Docker-interne Service-Namen weiter
  frontend:
    image: node:20-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
      VITE_KEYCLOAK_URL: "http://keycloak:8080"
      VITE_TILESERVER_URL: "http://tileserver:8080"
    command: sh -c "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 120s
    restart: unless-stopped
