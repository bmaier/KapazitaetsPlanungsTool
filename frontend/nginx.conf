server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-interner DNS — Hostnamen werden lazy per Request aufgelöst,
    # nicht beim nginx-Start. Verhindert "host not found"-Crash wenn
    # backend/keycloak beim Containerstart noch nicht erreichbar sind.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SPA-Routing: alle Pfade auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum Backend
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Keycloak-Proxy
    location /realms/ {
        set $keycloak http://keycloak:8080;
        proxy_pass $keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
