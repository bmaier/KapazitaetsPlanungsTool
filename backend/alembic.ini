# Alembic Configuration File für BorderCapControl Backend

[alembic]
# Pfad zum Migrationsverzeichnis (relativ zu diesem File)
script_location = alembic

# URL wird aus Umgebungsvariable DATABASE_URL gelesen (siehe env.py)
# Nicht hier setzen — kein Hardcoding von Credentials!
sqlalchemy.url = postgresql+asyncpg://bordercap:bordercap_dev@postgres:5432/bordercap

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
