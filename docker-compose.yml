---
# BorderCapControl — Docker Compose (Basis-Konfiguration)
# Alle 6 Services mit Healthchecks und Abhängigkeiten.
# Port-Bindings und Dev-Overrides: siehe docker-compose.override.yml

version: "3.9"

networks:
  bordercap_net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primäre Datenbank
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bordercap}
      POSTGRES_USER: ${POSTGRES_USER:-bordercap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bordercap_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/00_roles.sql:/docker-entrypoint-initdb.d/00_roles.sql:ro
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - bordercap_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bordercap} -d ${POSTGRES_DB:-bordercap}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak 24 — Identity & Access Management
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - bordercap_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI Backend — Hexagonale Architektur
  # ---------------------------------------------------------------------------
  backend:
    image: bosenet/bordercapcontrol-backend:01
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bordercap:bordercap_dev@postgres:5432/bordercap}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bordercapcontrol}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bordercapcontrol-frontend}
    networks:
      - bordercap_net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SKOS Codelisten Service
  # ---------------------------------------------------------------------------
  skos_service:
    image: bosenet/bordercapcontrol-skos:01
    networks:
      - bordercap_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Tileserver GL — Kartenservice (Placeholder ohne MBTiles)
  # ---------------------------------------------------------------------------
  tileserver:
    image: maptiler/tileserver-gl:latest
    networks:
      - bordercap_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React Frontend — Nginx-gehostet (Prod) / Vite Dev-Server (Override)
  # Kein Compose-Healthcheck: Prod-Image hat HEALTHCHECK im Dockerfile,
  # Dev-Override (node:20-alpine + Vite) kennt kein nginx — würde immer scheitern.
  # ---------------------------------------------------------------------------
  frontend:
    image: bosenet/bordercapcontrol-frontend:01
    networks:
      - bordercap_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
